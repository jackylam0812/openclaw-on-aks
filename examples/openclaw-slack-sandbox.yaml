apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: openclaw-slack-sandbox
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: openclaw-slack-sandbox
    spec:
      runtimeClassName: kata-qemu
      serviceAccountName: openclaw-sandbox
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        katacontainers.io/kata-runtime: "true"
      tolerations:
      - key: kata
        operator: Equal
        value: "true"
        effect: NoSchedule
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                cat > /home/node/.openclaw/openclaw.json <<'EOF'
              {
                "models": {
                  "providers": {
                    "litellm": {
                      "baseUrl": "http://litellm.litellm.svc.cluster.local:4000",
                      "apiKey": "YOUR_LITELLM_API_KEY",
                      "api": "openai-completions",
                      "models": [
                        {
                          "id": "claude-opus-4-6",
                          "name": "Claude Opus 4.6 (LiteLLM)",
                          "reasoning": true,
                          "input": ["text", "image"],
                          "contextWindow": 200000,
                          "maxTokens": 8192
                        }
                      ]
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "litellm/claude-opus-4-6"
                    },
                    "workspace": "/home/node/.openclaw/workspace"
                  }
                },
                "channels": {
                  "slack": {
                    "enabled": true,
                    "botToken": "YOUR_BOT_TOKEN",
                    "appToken": "YOUR_APP_TOKEN",
                    "dmPolicy": "open",
                    "allowFrom": ["*"]
                  }
                },
                "gateway": {
                  "port": 18789,
                  "mode": "local",
                  "bind": "lan",
                  "controlUi": {
                    "dangerouslyAllowHostHeaderOriginFallback": true
                  }
                },
                "plugins": {
                  "entries": {
                    "slack": {
                      "enabled": true
                    }
                  }
                }
              }
              EOF
              fi
              exec node dist/index.js gateway --bind=lan --port 18789 --allow-unconfigured --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: workspaces-pvc
      volumes:
        - name: config-volume
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: workspaces-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal-api
  namespace: portals
---
# Allow portal-api to create/update Sandbox CRs in the openclaw namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portal-api-sandbox-manager
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-api-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: portal-api
    namespace: portals
roleRef:
  kind: ClusterRole
  name: portal-api-sandbox-manager
  apiGroup: rbac.authorization.k8s.io

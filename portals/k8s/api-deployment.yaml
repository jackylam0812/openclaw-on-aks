apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-api
  namespace: portals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-api
  template:
    metadata:
      labels:
        app: portal-api
    spec:
      serviceAccountName: portal-api
      containers:
        - name: portal-api
          image: PORTAL_API_IMAGE
          ports:
            - containerPort: 3000
          env:
            - name: JWT_SECRET
              value: JWT_SECRET_VALUE
            - name: OPENCLAW_API_URL
              value: http://litellm.litellm.svc.cluster.local:4000
            - name: LITELLM_API_KEY
              value: LITELLM_API_KEY_VALUE
            - name: LITELLM_MASTER_KEY
              value: LITELLM_MASTER_KEY_VALUE
            - name: API_BASE_URL
              value: API_BASE_URL_VALUE
            - name: TLS_CERT_PATH
              value: /etc/tls/tls.crt
            - name: DB_PATH
              value: /data/db.sqlite
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: azure-sp-creds
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: azure-sp-creds
                  key: AZURE_CLIENT_SECRET
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: azure-sp-creds
                  key: AZURE_TENANT_ID
          volumeMounts:
            - name: db-storage
              mountPath: /data
            - name: tls-cert
              mountPath: /etc/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: portal-db-pvc
        - name: tls-cert
          configMap:
            name: tls-public-cert
---
apiVersion: v1
kind: Service
metadata:
  name: portal-api
  namespace: portals
spec:
  selector:
    app: portal-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-api
  namespace: portals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-api
  template:
    metadata:
      labels:
        app: portal-api
    spec:
      containers:
        - name: portal-api
          image: PORTAL_API_IMAGE
          ports:
            - containerPort: 3000
          env:
            - name: JWT_SECRET
              value: JWT_SECRET_VALUE
            - name: OPENCLAW_API_URL
              value: http://litellm.litellm.svc.cluster.local:4000
            - name: DB_PATH
              value: /data/db.sqlite
          volumeMounts:
            - name: db-storage
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: portal-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: portal-api
  namespace: portals
spec:
  selector:
    app: portal-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

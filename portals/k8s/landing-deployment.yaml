apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: portals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
      - name: landing-page
        image: ockataaksext01acr.azurecr.io/openclaw-landing:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page
  namespace: portals
spec:
  selector:
    app: landing-page
  ports:
  - port: 3000
    targetPort: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: portals
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-portal
  template:
    metadata:
      labels:
        app: admin-portal
    spec:
      containers:
        - name: admin-portal
          image: ADMIN_PORTAL_IMAGE
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: PORTAL_API_URL
          livenessProbe:
            httpGet:
              path: /admin
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /admin
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-portal
  namespace: portals
spec:
  selector:
    app: admin-portal
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

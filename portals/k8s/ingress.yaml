apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portals-ingress
  namespace: portals
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /admin(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: admin-portal
            port:
              number: 3000
      - path: /app(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: customer-portal
            port:
              number: 3000
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: portal-api
            port:
              number: 3000

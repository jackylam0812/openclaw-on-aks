apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portals-ingress
  namespace: portals
  annotations:
    nginx.ingress.kubernetes.io/app-root: /app/login
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-portal
            port:
              number: 3000
      - path: /app
        pathType: Prefix
        backend:
          service:
            name: customer-portal
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portals-api-ingress
  namespace: portals
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
  - secretName: ingress-tls-cert
  rules:
  - http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: portal-api
            port:
              number: 3000

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portals-ingress
  namespace: portals
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - demo.openclaw-azure.org
    secretName: openclaw-demo-tls
  rules:
  - host: demo.openclaw-azure.org
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-portal
            port:
              number: 3000
      - path: /app
        pathType: Prefix
        backend:
          service:
            name: customer-portal
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-ingress
  namespace: portals
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - demo.openclaw-azure.org
    secretName: openclaw-demo-tls
  rules:
  - host: demo.openclaw-azure.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: landing-page
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portals-api-ingress
  namespace: portals
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - demo.openclaw-azure.org
    secretName: openclaw-demo-tls
  rules:
  - host: demo.openclaw-azure.org
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: portal-api
            port:
              number: 3000

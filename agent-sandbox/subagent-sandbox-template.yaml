---
# Dynamic Sandbox template for subagent isolation
# Variables are substituted at creation time by the SubagentController:
#   ${SANDBOX_NAME}   - Generated name: subagent-<parent>-<task-id>
#   ${PARENT_SANDBOX}  - Name of the parent sandbox that spawned this subagent
#   ${SHUTDOWN_TIME}   - ISO 8601 date-time for auto-cleanup (now + TTL)
#   ${TTL_SECONDS}     - TTL in seconds (for annotation)
#   ${TASK_ID}         - Unique task identifier
apiVersion: v1
kind: ConfigMap
metadata:
  name: subagent-sandbox-template
  namespace: default
  labels:
    app.kubernetes.io/name: openclaw-subagent
    app.kubernetes.io/component: subagent
data:
  sandbox-template.yaml: |
    apiVersion: agents.x-k8s.io/v1alpha1
    kind: Sandbox
    metadata:
      name: ${SANDBOX_NAME}
      labels:
        app.kubernetes.io/name: openclaw-subagent
        app.kubernetes.io/component: subagent
        subagent: "true"
        parent-sandbox: ${PARENT_SANDBOX}
        task-id: ${TASK_ID}
      annotations:
        sandbox.agents.x-k8s.io/ttl: "${TTL_SECONDS}"
        sandbox.agents.x-k8s.io/parent: ${PARENT_SANDBOX}
        sandbox.agents.x-k8s.io/created-by: subagent-controller
    spec:
      shutdownTime: "${SHUTDOWN_TIME}"
      podTemplate:
        metadata:
          labels:
            sandbox: ${SANDBOX_NAME}
            subagent: "true"
            parent-sandbox: ${PARENT_SANDBOX}
            azure.workload.identity/use: "true"
        spec:
          runtimeClassName: kata-mshv-vm-isolation
          serviceAccountName: openclaw-sandbox
          automountServiceAccountToken: true
          activeDeadlineSeconds: 1800
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          nodeSelector:
            katacontainers.io/kata-runtime: "true"
          tolerations:
            - key: kata
              operator: Equal
              value: "true"
              effect: NoSchedule
          containers:
            - name: openclaw
              image: ghcr.io/openclaw/openclaw:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              command:
                - sh
                - -c
                - |
                  cat > /home/node/.openclaw/openclaw.json <<'CONF'
                  {
                    "models": {
                      "providers": {
                        "litellm": {
                          "baseUrl": "http://litellm.litellm.svc.cluster.local:4000",
                          "apiKey": "inherited-from-parent",
                          "api": "openai-completions",
                          "models": [
                            {
                              "id": "gpt-5.4",
                              "name": "GPT-5.4 (LiteLLM)",
                              "reasoning": true,
                              "input": ["text", "image"],
                              "contextWindow": 200000,
                              "maxTokens": 8192
                            }
                          ]
                        }
                      }
                    },
                    "agents": {
                      "defaults": {
                        "model": {
                          "primary": "litellm/gpt-5.4"
                        },
                        "workspace": "/home/node/.openclaw/workspace"
                      }
                    },
                    "gateway": {
                      "port": 18789,
                      "mode": "local",
                      "bind": "lan"
                    }
                  }
                  CONF
                  exec node dist/index.js gateway --bind=lan --port 18789 --allow-unconfigured --verbose
              ports:
                - containerPort: 18789
                - containerPort: 18790
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - mountPath: /home/node/.openclaw
                  name: workspaces-pvc
          volumes:
            - name: config-volume
              emptyDir: {}
      volumeClaimTemplates:
        - metadata:
            name: workspaces-pvc
          spec:
            storageClassName: azure-disk-premium
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
